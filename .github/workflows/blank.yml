#this is a basic workflow to help you get srarted with acions
name: CI
# Contols when the workflow will run 
on:
  #triggers the workflow on push or pull request wvent bur only for the "main" b branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allow you to run this workflow manually from the Sction tab
  workflow_dispatch:
# A workflow run is made up of one or more jobs that can run seperatly or in parallle
jobs:
  # This workflow contains a single job called "build"
  build:
    #The type of runner that the job will run on 
    runs-on: ubuntu-latest
    # steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # checks-out your repository under $GITHUB_WORKSPACE, so your job can access ir cancel-timeout-minutes: 
      - uses: actions/checkout@v6

      # Runs a single command using the runners shell
      - name: Run a milti-line script
        run: |
          echo "add other actions to build"
          echo "test, and deploy your project"
          echo {{ $RUNNER_OS }}
  show_result:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run the second job
        run: echo "This is the 2nd Job"
  build+showresult:
    needs:
      - build
      - show_result
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run the second job
        run: echo "This the 3rd Job"
